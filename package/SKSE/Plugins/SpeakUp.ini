; Speak Up — settings. Mirrored by the in-game MCM (MCM Helper); either can be used.

[Voice]
; Bare name (and bare left/right/dual) action: 1 = CAST, 0 = EQUIP.
; Explicit "equip"/"cast" prefixes always override.
DefaultActionCast=1

; Hand used by "equip <spell>" (and a bare name when DefaultActionCast=0).
; Left | Right | Both.  Explicit "equip left/right/dual" always override.
EquipDefaultHand=Left

; Instant-casting behavior for the "cast" action on SPELLS:
;   InstantCast=1        : voice-cast fires the spell instantly (costs magicka).
;   InstantCast=0        : voice-cast instead EQUIPS the spell (you cast it yourself).
; Concentration spells (e.g. Flames) and long-charge spells (e.g. Mass Paralysis)
; misbehave / unbalance when instant-cast, so by default they are EQUIPPED instead.
; Set these to 1 to allow instant-casting them anyway.
InstantCast=1
AllowConcentration=0
AllowLongCast=0
LongCastThreshold=1.0   ; charge time (seconds) at/above which a spell counts as "long"

; Listen controls — DirectInput (DX) scan codes; 0 = unbound. Best set via the MCM
; (Developer-free; click the control and press the key). Each has an optional modifier.
; Example: PushToTalkKeyDX=T, ListenToggleKeyDX=T, ListenToggleModDX=LAlt  -> hold T to
; talk, Alt+T to toggle hands-free. If push-to-talk is bound, listening is OFF until you
; hold it (or toggle on). All unbound (default) = always listening.
;   DX codes: T=0x14  LAlt=0x38  LCtrl=0x1D  LShift=0x2A
; Master enables — a bound key does nothing unless its feature is enabled (the MCM
; grays out the key fields until these are on).
EnablePushToTalk=0
PushToTalkKeyDX=0
PushToTalkModDX=0
EnableListenToggle=0
ListenToggleKeyDX=0
ListenToggleModDX=0

; Recognition sensitivity: minimum confidence (0.0–1.0) to accept a recognized
; phrase. 0.0 = accept anything in-grammar (most responsive). Raise toward ~0.5
; if you get false casts from background noise; lower if it ignores you.
Sensitivity=0.0

; Response speed: seconds the recognizer waits after your best guess stops changing
; before it fires (0.1–2.0). Lower = snappier casts; too low can cut multi-word phrases.
UtteranceThreshold=1.0

; Scale handling. 0 (default) = all known spells are voice-castable (a safety cap
; always prevents crashes). 1 = when you know 600+ spells, limit the voice
; vocabulary to favorited/equipped spells (+ all powers/shouts) for speed/accuracy.
ScopeAtScale=0

; EXPERIMENTAL. 1 = play the visible shout body animation when voice-casting a shout
; (vanilla uses one animation for all word levels). 0 = default (no animation). A
; paired stop is always scheduled so the pose can't get stuck.
PlayShoutAnimation=0

; --- Developer / diagnostics (leave 0 for normal play; also in the MCM "Developer" tab) ---
; DebugLogging=1 : log every recognized phrase + confidence and roster/grammar diagnostics
;                  to SpeakUp.log. 0 = only warnings/errors (no extra data stored).
DebugLogging=0
; DumpGrammar=1  : when turned on, write the full live phrase->command grammar to the log once.
DumpGrammar=0

; Voice utility commands (no setup needed; all keybind-free, spoken):
;   "close menu" / "close"             - close an open menu
;   "wait <one..twenty four> hours"    - skip that many hours (e.g. "wait seven hours")
;   "open map/inventory/magic/skills/journal", "wait", "quick save", "quick load"
;   "clear hands", "clear voice", "start/stop listening"
