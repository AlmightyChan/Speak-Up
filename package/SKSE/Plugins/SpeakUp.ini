; Speak Up — settings. Mirrored by the in-game MCM (MCM Helper); either can be used.

[Voice]
; Default action when you say a spell/power/shout name with no prefix:
;   DefaultAction=1 (Cast)  : the name fires the spell/shout instantly.
;   DefaultAction=0 (Equip) : the name equips the item to your hand.
; Explicit "equip"/"cast" prefixes always override this.
DefaultAction=1

; Hand used by "equip <spell>" (and a bare name when DefaultAction=0).
; Left | Right | Both.  Explicit "equip left/right/dual" always override.
EquipDefaultHand=Left

; Instant-casting behavior for the "cast" action on SPELLS:
;   InstantCast=1        : voice-cast fires the spell instantly (costs magicka).
;   InstantCast=0        : voice-cast instead EQUIPS the spell (you cast it yourself).
; Concentration spells (e.g. Flames) and long-charge spells (e.g. Mass Paralysis)
; misbehave / unbalance when instant-cast, so by default they are EQUIPPED instead.
; Set these to 1 to allow instant-casting them anyway.
InstantCast=1
AllowConcentration=0
AllowLongCast=0
LongCastThreshold=1.0   ; charge time (seconds) at/above which a spell counts as "long"

; Listen controls — DirectInput (DX) scan codes; 0 = unbound. Best set via the MCM
; (Developer-free; click the control and press the key). Each has an optional modifier.
; Example: PushToTalkKeyDX=T, ListenToggleKeyDX=T, ListenToggleModDX=LAlt  -> hold T to
; talk, Alt+T to toggle hands-free. If push-to-talk is bound, listening is OFF until you
; hold it (or toggle on). All unbound (default) = always listening.
;   DX codes: T=0x14  LAlt=0x38  LCtrl=0x1D  LShift=0x2A
; Master enables — a bound key does nothing unless its feature is enabled (the MCM
; grays out the key fields until these are on).
EnablePushToTalk=0
PushToTalkKeyDX=0
PushToTalkModDX=0
EnableListenToggle=0
ListenToggleKeyDX=0
ListenToggleModDX=0

; Scale handling. 0 (default) = all known spells are voice-castable (a safety cap
; always prevents crashes). 1 = when you know 600+ spells, limit the voice
; vocabulary to favorited/equipped spells (+ all powers/shouts) for speed/accuracy.
ScopeAtScale=0

; EXPERIMENTAL. 1 = play the visible shout body animation when voice-casting a shout
; (vanilla uses one animation for all word levels). 0 = default (no animation). A
; paired stop is always scheduled so the pose can't get stuck.
PlayShoutAnimation=0

; Shout casting method:
;   ShoutUseRealCast=1 (default): equip the shout then inject the bound Shout key via
;     Win32 SendInput so the engine runs its full voice pipeline — movement (Whirlwind
;     Sprint, Become Ethereal), shout SOUND, animations, scripts, and cooldown all work
;     exactly as if you pressed the key manually.
;     MEDIUM CONFIDENCE: requires the game window to be focused and accepting Win32 input.
;     Works reliably in borderless-window or windowed mode. Fullscreen-exclusive (D3D
;     exclusive-fullscreen) may swallow injected input — use ShoutUseRealCast=0 in that case.
;   ShoutUseRealCast=0 (legacy): directly cast the word-level spell via CastSpellImmediate.
;     Simple shout effects (Unrelenting Force damage etc.) work, but NO movement/sound/anim.
ShoutUseRealCast=1

; Character Thu'um voice (immersion):
;   ShoutPlayVoice=0 (default): SILENT — you spoke the words, so YOU are the voice. Shouts
;     fire their effect with no character vocalization. Shouts that don't need the engine
;     pipeline use a fast, silent instant-cast at the exact word level you spoke.
;   ShoutPlayVoice=1: the character vocalizes the Thu'um — the full engine shout pipeline
;     runs for EVERY shout so the dragon-voice audio plays.
; NOTE: movement/script shouts (Whirlwind Sprint, Become Ethereal, Storm Call, ...) ALWAYS
; use the pipeline so they physically work, so they vocalize even when this is 0.
ShoutPlayVoice=0

; DirectInput scan code for the Shout key, used when the game's ControlMap returns
; unmapped (e.g. controller-only binding or exotic keyboard layout).
; Default 0x39 = Space bar (the vanilla default shout/sheathe key).
; DX scan codes: Space=0x39  Z=0x2C  V=0x2F  (must be hex with 0x prefix or decimal).
ShoutKeyDX=0x39

; (Per-word-level key-hold timing is derived automatically from the game's own
; fShoutTime1/fShoutTime2 settings at cast time, so there is nothing to tune here.)

; --- Recognition engine ---
; Speak Up uses sherpa-onnx: open-vocabulary ASR + fuzzy match to your live spell roster.
; It is the sole recognition engine (there is no engine toggle).

; sherpa-onnx fuzzy-match threshold (0.4–0.9) — the "Recognition confidence" knob. How
; close sherpa's transcript must be to a known spell name (Jaro-Winkler similarity) to
; count as a match. Lower = more lenient (may produce false positives); higher = stricter.
; Applied on change (re-read when this file or the MCM settings change; not polled live).
SherpaMatchThreshold=0.62

; Recognition "responsiveness"/"sensitivity" — sherpa endpoint trailing-silence rules
; (seconds). These take effect the next time the recognizer (re)starts (flip
; "Restart recognizer" on the MCM Developer page, or relaunch).
;   SherpaEndpointRule2 = end-of-phrase pause (PRIMARY): pause after you stop speaking
;       before the command is sent. Lower = snappier but may cut off long names. (0.15–1.5)
;   SherpaEndpointRule1 = hard silence cutoff: firm backstop even mid-phrase. (0.2–2.0)
;   SherpaEndpointRule3 = maximum phrase length: safety cap so recording can't run away. (10–60)
SherpaEndpointRule2=0.45
SherpaEndpointRule1=0.7
SherpaEndpointRule3=20.0

; --- Developer / diagnostics (default 1 for new installs; set to 0 for normal play once
;     you have confirmed recognition is working — also controllable in the MCM "Developer" tab) ---
; DebugLogging=1 : log every recognized phrase + confidence and roster/grammar diagnostics
;                  to SpeakUp.log. 0 = only warnings/errors (no extra data stored).
DebugLogging=1
; DumpGrammar=1  : when turned on, write the full live phrase->command grammar to the log once.
DumpGrammar=1

; Voice utility commands (no setup needed; all keybind-free, spoken):
;   "close menu" / "close"             - close an open menu
;   "wait <one..twenty four> hours"    - skip that many hours (e.g. "wait seven hours")
;   "open map/inventory/magic/skills/journal", "wait", "quick save", "quick load"
;   "clear hands", "clear voice", "start/stop listening"
